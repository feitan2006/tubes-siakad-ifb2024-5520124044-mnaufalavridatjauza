[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.sqlite3", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.openssl", "php82Extensions.gd", "composer"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-reqs",
  "cp .env.example .env",
  "php artisan key:generate"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"